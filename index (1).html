<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bonus Calculator</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  input { width: 100px; margin: 5px; }
  button { margin: 10px; padding: 5px 10px; }
  .result { margin-top: 20px; background-color: #f2f2f2; padding: 15px; border-radius: 5px; }
</style>
</head>
<body>

<h2>Bonus Calculator</h2>

<label>Signed: <input type="number" id="signed" min="0" value="0"></label><br>
<label>Rejected: <input type="number" id="rejected" min="0" value="0"></label><br>
<label>Usage: <input type="number" id="usage" min="0" value="0"></label><br>

<button onclick="calculateBonus()">Calculate Bonus</button>

<div class="result" id="bonusResult"></div>

<script>
function calculateBonus() {
  const signed = parseInt(document.getElementById('signed').value) || 0;
  const rejected = parseInt(document.getElementById('rejected').value) || 0;
  const usage = parseInt(document.getElementById('usage').value) || 0;

  // 1️⃣ Total Apps Bonus = (Signed + Rejected) × 50
  const totalAppsBonus = (signed + rejected) * 50;

  // 2️⃣ Determine rate based on Signed
  let rate = 0;
  if (signed <= 10) rate = 150;
  else if (signed <= 20) rate = 175;
  else if (signed <= 30) rate = 200;
  else if (signed <= 40) rate = 225;
  else rate = 250;

  // Signed and Usage Bonus = (Signed + Usage) × rate
  const signedUsageBonus = (signed + usage) * rate;

  // 3️⃣ Total Bonus
  const totalBonus = totalAppsBonus + signedUsageBonus;

  // Display calculations
  const resultDiv = document.getElementById('bonusResult');
  resultDiv.innerHTML = `
    <h3>Calculations:</h3>
    <p><strong>Total Apps Bonus:</strong> (${signed} + ${rejected}) × 50 = ${totalAppsBonus}</p>
    <p><strong>Signed and Usage Bonus:</strong> (${signed} + ${usage}) × ${rate} = ${signedUsageBonus}</p>
    <p><strong>Total Bonus:</strong> ${totalAppsBonus} + ${signedUsageBonus} = ${totalBonus}</p>
  `;
}
</script>

</body>
</html>
